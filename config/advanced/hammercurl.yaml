HAMMERCURL_UP_ELBOW_THR: 80.0    # Must curl tight to the shoulder
HAMMERCURL_MIN_HOLD_FRAMES: 6    # Enforce a slight pause/squeeze at the top

# Smoothing (ADVANCED: Less smoothing)
ema_elbow_alpha: 0.6

debug: true