# FILE: configs/advanced/reversehypermachine/default.yaml
#
# ADVANCED: Stricter, full ROM, and enforces straight legs.

# REP COUNTING IS BASED ON HIP ANGLE
down_hip_angle: 100.0   # ADVANCED: Must swing deeper
up_hip_angle: 165.0     # ADVANCED: Must lift higher (slight hyperextension)
down_margin: 10.0
up_margin: 10.0

# FORM CHECK IS BASED ON KNEE ANGLE
min_knee_angle: 155.0   # ADVANCED: Enforces straighter legs

# Debounce / hysteresis (ADVANCED: Enforces a slight pause at the top)
min_down_frames: 1
min_up_frames: 3
refractory_frames: 6

# Smoothing (ADVANCED: Less smoothing for more responsive tracking)
ema_hip_alpha: 0.6
ema_knee_alpha: 0.6

debug: true