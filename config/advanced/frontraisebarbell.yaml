# FILE: configs/advanced/frontraisebarbell/default.yaml
#
# ADVANCED: Stricter, full ROM, enforces straight arms and stable body.

# REP COUNTING IS BASED ON SHOULDER ANGLE
down_shoulder_angle: 10.0     # ADVANCED: Must lower arms fully
up_shoulder_angle: 90.0       # ADVANCED: Must raise to a full 90 degrees
down_margin: 5.0
up_margin: 5.0

# FORM CHECK
min_elbow_angle: 160.0        # ADVANCED: Enforces very straight arms
min_body_line_angle: 170.0    # ADVANCED: Enforces a very strict, upright body

# Debounce / hysteresis (ADVANCED: Enforces a slight pause)
min_down_frames: 3
min_up_frames: 3
refractory_frames: 6

# Smoothing (ADVANCED: Less smoothing for more responsive tracking)
ema_shoulder_alpha: 0.6
ema_elbow_alpha: 0.6
ema_body_line_alpha: 0.6

debug: true