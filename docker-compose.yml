
services:
  fitness-api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ${APP_NAME}

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${APP_PORT}:9001"

    volumes:
      - ./logs:/app/logs

    networks:
      - fitness-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  fitness-network:
    driver: bridge
